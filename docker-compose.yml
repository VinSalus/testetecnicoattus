services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: demandas
      POSTGRES_USER: demandas
      POSTGRES_PASSWORD: demandas
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demandas -d demandas"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/demandas
      SPRING_DATASOURCE_USERNAME: demandas
      SPRING_DATASOURCE_PASSWORD: demandas
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
